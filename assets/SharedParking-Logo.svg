<svg id="logo-svg" class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Portable CSS Styles baked inside the SVG so they transfer during download -->
                <style>
                    .fob-bg {
                        fill: url(#squircleGrad);
                    }
                    .pin-body {
                        fill: url(#pinGrad);
                    }
                    .p-symbol {
                        stroke: #ffffff;
                        stroke-width: 4.5;
                        stroke-linecap: round;
                        stroke-linejoin: round;
                        fill: none;
                    }
                </style>
                <defs>
                    <!-- iOS Squircle Gradient (Skyline Blue Premium) -->
                    <linearGradient id="squircleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#ffffff"/>
                        <stop offset="100%" stop-color="#e0eafd"/>
                    </linearGradient>
                    <!-- Location Pin Key-Fob Body Gradient -->
                    <linearGradient id="pinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#1d4ed8"/>
                        <stop offset="100%" stop-color="#60a5fa"/>
                    </linearGradient>
                </defs>

                <!-- Embedded App Icon Squircle Background -->
                <rect class="fob-bg" x="0" y="0" width="100" height="100" rx="24"/>

                <!-- Location Pin Body (Center Y is 38, Tip Y is 82) -->
                <path class="pin-body" d="M 50 82 C 34 68 26 53 26 38 A 24 24 0 0 1 74 38 C 74 53 66 68 50 82 Z"/>

                <!-- Centered Minimalist "P" Logo Mark -->
                <path class="p-symbol" d="M 45 46 V 30 H 51 A 4 4 0 0 1 55 34 A 4 4 0 0 1 51 38 H 45"/>
            </svg>